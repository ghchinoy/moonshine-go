name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-release-linux:
    name: Build & Package Linux Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'

      - name: Install C toolchain dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libasound2-dev

      - name: Fetch Prebuilt libmoonshine Shared Libraries
        run: |
          make fetchlib MOONSHINE_PLATFORM=linux-x86_64

      - name: Build & Package Release Tarball
        run: |
          make release-package MOONSHINE_PLATFORM=linux-x86_64

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.tar.gz
          generate_release_notes: true
